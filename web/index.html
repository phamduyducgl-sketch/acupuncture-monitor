<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0,
        maximum-scale=1.0, user-scalable=no">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <title>Acupuncture Monitor</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

  <!-- ── Header ── -->
  <header>
    <h1>Acupuncture Monitor</h1>
    <div id="status-bar">
      <span id="cv-status" class="badge badge-warn">⏳ OpenCV</span>
      <span id="cam-status" class="badge">📷 Tắt</span>
    </div>
  </header>

  <!-- ── Camera view ── -->
  <div class="cam-wrap">
    <video id="video" playsinline autoplay muted></video>
    <canvas id="canvas"></canvas>
    <div id="cam-placeholder" class="cam-placeholder">
      📷<br>Nhấn BẬT CAMERA để bắt đầu
    </div>
    <div id="no-detect" class="overlay-pill" style="display:none">Không tìm thấy kim</div>
    <div id="set-pill" class="overlay-pill set-ok" style="display:none">✔ Đã SET</div>
  </div>

  <!-- ── Student ID ── -->
  <section class="card row-gap">
    <div class="input-row">
      <input id="stu-id" type="text" placeholder="Nhập MSSV / ID"
             autocomplete="off" autocorrect="off" autocapitalize="off">
      <button id="btn-save" class="btn btn-yellow">LƯU</button>
    </div>
    <span id="save-msg" class="hint"></span>
  </section>

  <!-- ── Action buttons ── -->
  <div class="action-row">
    <button id="btn-set"     class="btn btn-blue">SET VỊ TRÍ</button>
    <button id="btn-display" class="btn btn-green">HIỂN THỊ KQ</button>
  </div>

  <!-- ── Metrics ── -->
  <div class="metrics-grid">
    <div class="metric">
      <div class="m-label">Góc châm</div>
      <div class="m-val" id="val-angle">—</div>
      <div class="m-unit">độ</div>
    </div>
    <div class="metric">
      <div class="m-label">Vận tốc TB</div>
      <div class="m-val" id="val-avg">—</div>
      <div class="m-unit">cm/s</div>
    </div>
    <div class="metric highlight">
      <div class="m-label">Chiều dài</div>
      <div class="m-val" id="val-len">—</div>
      <div class="m-unit">cm</div>
    </div>
    <div class="metric">
      <div class="m-label">Còn lại</div>
      <div class="m-val" id="val-check">—</div>
      <div class="m-unit">cm</div>
    </div>
  </div>

  <!-- ── History ── -->
  <section class="card history">
    <div class="hist-row">
      <span class="hist-lbl">Vận tốc</span>
      <span class="hist-val" id="v1">—</span>
      <span class="hist-val" id="v2">—</span>
      <span class="hist-val" id="v3">—</span>
      <span class="hist-unit">cm/s</span>
    </div>
    <div class="hist-row">
      <span class="hist-lbl">Dịch chuyển</span>
      <span class="hist-val" id="d1">—</span>
      <span class="hist-val" id="d2">—</span>
      <span class="hist-val" id="d3">—</span>
      <span class="hist-unit">cm</span>
    </div>
  </section>

  <!-- ── Camera toggle ── -->
  <div class="cam-ctrl">
    <button id="btn-cam" class="btn btn-cam">BẬT CAMERA</button>
  </div>

  <!-- ── Export ── -->
  <div class="cam-ctrl" style="padding-top:0">
    <button id="btn-export" class="btn btn-export">⬇ TẢI FILE CSV</button>
  </div>

  <!-- ── Settings toggle ── -->
  <div class="cam-ctrl" style="padding-top:0">
    <button id="btn-settings" class="btn btn-settings">⚙ CÀI ĐẶT</button>
  </div>

  <!-- ── Settings panel ── -->
  <section id="settings-panel" class="card settings-panel" style="display:none">
    <div class="settings-title">Ngưỡng HSV (màu xanh lá đầu kim)</div>
    <div class="hsv-row">
      <span class="hsv-label">Thấp</span>
      <label class="hsv-field">H<input id="hsv-lh" type="number" min="0" max="179" value="97"></label>
      <label class="hsv-field">S<input id="hsv-ls" type="number" min="0" max="255" value="73"></label>
      <label class="hsv-field">V<input id="hsv-lv" type="number" min="0" max="255" value="140"></label>
    </div>
    <div class="hsv-row">
      <span class="hsv-label">Cao</span>
      <label class="hsv-field">H<input id="hsv-uh" type="number" min="0" max="179" value="136"></label>
      <label class="hsv-field">S<input id="hsv-us" type="number" min="0" max="255" value="255"></label>
      <label class="hsv-field">V<input id="hsv-uv" type="number" min="0" max="255" value="255"></label>
    </div>
    <div class="settings-divider"></div>
    <div class="hsv-row">
      <span class="hsv-label">Tỉ lệ</span>
      <label class="hsv-field scale-field">cm/px<input id="px-scale" type="number" step="0.0001" min="0.001" max="1" value="0.0177"></label>
    </div>
    <button id="btn-apply" class="btn btn-apply">ÁP DỤNG</button>
    <span id="apply-msg" class="hint" style="margin-top:4px"></span>
  </section>

  <!-- ── Scripts (order matters) ── -->
  <!--
    OpenCV.js ~8MB — loads asynchronously.
    onOpenCvReady() được gọi khi tải xong.
  -->
  <script async
    src="https://docs.opencv.org/4.8.0/opencv.js"
    onload="onOpenCvReady()"
    onerror="onOpenCvError()">
  </script>
  <script src="js/needle_calculator.js"></script>
  <script src="js/data_recorder.js"></script>
  <script src="js/needle_detector.js"></script>
  <script src="js/app.js"></script>

</body>
</html>
